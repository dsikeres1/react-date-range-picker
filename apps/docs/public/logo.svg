<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Calendar outer frame -->
  <rect x="20" y="20" width="160" height="160" rx="24" fill="#7DD3FC"/>

  <!-- Calendar body (white inner) -->
  <rect x="30" y="62" width="140" height="110" rx="16" fill="white"/>

  <!-- Dot grid: 5 cols x 4 rows -->
  <!-- Row 1 -->
  <circle cx="54" cy="84" r="7" fill="#D4D4D8"/>
  <circle cx="78" cy="84" r="7" fill="#D4D4D8"/>
  <circle cx="122" cy="84" r="7" fill="#D4D4D8"/>
  <circle cx="146" cy="84" r="7" fill="#D4D4D8"/>

  <!-- Row 2 - Range row -->
  <circle cx="54" cy="108" r="7" fill="#D4D4D8"/>
  <!-- Range bar -->
  <rect x="78" y="102" width="44" height="12" rx="6" fill="#7DD3FC"/>
  <!-- Range start dot -->
  <circle cx="78" cy="108" r="10" fill="#7DD3FC"/>
  <!-- React atom in start dot -->
  <g transform="translate(78,108)">
    <ellipse rx="7" ry="2.8" fill="none" stroke="white" stroke-width="0.9"/>
    <ellipse rx="7" ry="2.8" fill="none" stroke="white" stroke-width="0.9" transform="rotate(60)"/>
    <ellipse rx="7" ry="2.8" fill="none" stroke="white" stroke-width="0.9" transform="rotate(-60)"/>
    <circle r="1.5" fill="white"/>
  </g>
  <!-- Range end dot -->
  <circle cx="122" cy="108" r="10" fill="#7DD3FC"/>
  <!-- React atom in end dot -->
  <g transform="translate(122,108)">
    <ellipse rx="7" ry="2.8" fill="none" stroke="white" stroke-width="0.9"/>
    <ellipse rx="7" ry="2.8" fill="none" stroke="white" stroke-width="0.9" transform="rotate(60)"/>
    <ellipse rx="7" ry="2.8" fill="none" stroke="white" stroke-width="0.9" transform="rotate(-60)"/>
    <circle r="1.5" fill="white"/>
  </g>
  <circle cx="146" cy="108" r="7" fill="#D4D4D8"/>

  <!-- Row 3 -->
  <circle cx="54" cy="132" r="7" fill="#D4D4D8"/>
  <circle cx="78" cy="132" r="7" fill="#D4D4D8"/>
  <circle cx="100" cy="132" r="7" fill="#D4D4D8"/>
  <circle cx="122" cy="132" r="7" fill="#D4D4D8"/>
  <circle cx="146" cy="132" r="7" fill="#D4D4D8"/>

  <!-- Row 4 (partial month) -->
  <circle cx="54" cy="156" r="7" fill="#D4D4D8"/>
  <circle cx="78" cy="156" r="7" fill="#D4D4D8"/>
  <circle cx="100" cy="156" r="7" fill="#D4D4D8"/>
</svg>
